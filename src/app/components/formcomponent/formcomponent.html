<h2>REGISTRATION FORM</h2>

<form #myForm="ngForm" (submit)="onSubmit(myForm)">
    <div>
        <label>Username</label>
        <input type="text" name="username" [(ngModel)]="user.name" required #username="ngModel">
    </div>
    <div>
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="user.email" required #email="ngModel">
    </div>
    <div>
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="user.password" required #password="ngModel">
    </div>
    <div>
        <label>Age</label>
        <input type="number" name="age" [(ngModel)]="user.age" required #age="ngModel">
    </div>
    <div>
        <label>Gender</label>
        <input type="text" name="gender" [(ngModel)]="user.gender" required #gender="ngModel">
    </div>

    <button type="submit" [disabled]="myForm.invalid">
        Register
    </button>
</form>
