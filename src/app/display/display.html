<div>
    <p><b>{{ features.data }}</b></p>
    <p>{{ features.location }}</p>

    <img [src] = "imageUrl">

    <h2>Categories</h2>
    <ul>
        <li *ngFor="let user of users; let i = index">
            {{ i }}
            {{ user }}
        </li>

        @for (category of categories; track category.id){
            <li>{{ category.c_name }}</li>
        }
    </ul>
</div>
